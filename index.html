<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGRS Game Classifier Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
    <style>
        /* PERBAIKAN SCOPE: Variabel sekarang berlaku untuk Kontainer DAN Modal Overlay */
        #igrs-app-container, #igrs-modal-overlay {
            --igrs-bg: #F7F5F0;
            --igrs-surface: #FFFFFF;
            --igrs-border: #E2DDD6;
            --igrs-border-strong: #C8C2B8;
            --igrs-text: #1A1814;
            --igrs-text-muted: #6B655C;
            --igrs-text-faint: #A09890;
            --igrs-green: #2D6A4F;
            --igrs-green-bg: #D8F3DC;
            --igrs-amber: #7B4F12;
            --igrs-amber-bg: #FFF3CD;
            --igrs-red: #7B1F1F;
            --igrs-red-bg: #FFE0E0;
            --igrs-blue: #1A3A5C;
            --igrs-blue-bg: #DCE8F7;
            --igrs-font-display: 'Fraunces', Georgia, serif;
            --igrs-font-body: 'DM Sans', sans-serif;
            --igrs-font-mono: 'DM Mono', monospace;
            
            font-family: var(--igrs-font-body);
            color: var(--igrs-text);
            -webkit-font-smoothing: antialiased;
            box-sizing: border-box;
        }

        #igrs-app-container * { box-sizing: border-box; margin: 0; padding: 0; }

        #igrs-app-container {
            width: 100%;
            margin: 15px auto;
            padding: 1.5rem;
            background: var(--igrs-bg);
            line-height: 1.5;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.03);
            text-align: left;
            overflow: hidden;
        }

        #igrs-app-container header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 15px;
        }

        #igrs-app-container .header-title h1 {
            font-family: var(--igrs-font-display);
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 6px;
            color: var(--igrs-text);
        }

        #igrs-app-container .header-title p { color: var(--igrs-text-muted); font-size: 14px; margin: 0; }

        #igrs-app-container .sync-badge {
            font-family: var(--igrs-font-mono);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 30px;
            background: var(--igrs-surface);
            border: 1px solid var(--igrs-border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #igrs-app-container .sync-badge.active { color: var(--igrs-green); border-color: var(--igrs-green); }
        #igrs-app-container .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        #igrs-app-container .active .dot { background: var(--igrs-green); animation: igrs-pulse 1.5s infinite; }

        @keyframes igrs-pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }

        #igrs-app-container .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 2rem;
        }

        #igrs-app-container .metric-card {
            background: var(--igrs-surface);
            border: 1px solid var(--igrs-border);
            padding: 16px;
            border-radius: 12px;
        }

        #igrs-app-container .metric-card label {
            display: block;
            font-family: var(--igrs-font-mono);
            font-size: 9px;
            text-transform: uppercase;
            color: var(--igrs-text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        #igrs-app-container .metric-card .value {
            font-family: var(--igrs-font-display);
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 600;
            color: var(--igrs-text);
        }

        #igrs-app-container .sync-progress {
            background: var(--igrs-surface);
            border: 1px solid var(--igrs-border);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        #igrs-app-container .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-family: var(--igrs-font-mono);
            font-size: 11px;
            color: var(--igrs-text);
        }

        #igrs-app-container .progress-track { height: 6px; background: var(--igrs-bg); border-radius: 10px; overflow: hidden; }
        #igrs-app-container .progress-fill { height: 100%; background: var(--igrs-green); width: 0%; transition: width 0.4s ease; }

        #igrs-app-container .controls-bar {
            background: var(--igrs-surface);
            padding: 16px;
            border-radius: 14px;
            border: 1px solid var(--igrs-border);
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #igrs-app-container .search-row { display: flex; gap: 12px; flex-wrap: wrap; }
        #igrs-app-container .search-box { position: relative; flex: 1; min-width: 180px; }
        #igrs-app-container .search-box input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border-radius: 10px;
            border: 1px solid var(--igrs-border);
            font-family: var(--igrs-font-body);
            font-size: 14px;
            outline: none;
            background: #fff;
            color: var(--igrs-text);
        }
        #igrs-app-container .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--igrs-text-faint); }

        #igrs-app-container .dropdown-group { display: flex; gap: 10px; flex-wrap: wrap; }
        
        #igrs-app-container .sort-box select,
        #igrs-app-container .platform-box select {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--igrs-border);
            font-family: var(--igrs-font-body);
            font-size: 14px;
            background: var(--igrs-bg);
            color: var(--igrs-text);
            cursor: pointer;
            height: 100%;
        }

        #igrs-app-container .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        #igrs-app-container .filter-chips::-webkit-scrollbar { display: none; }
        #igrs-app-container .chip {
            white-space: nowrap;
            padding: 6px 16px;
            border-radius: 50px;
            border: 1px solid var(--igrs-border);
            background: var(--igrs-bg);
            font-family: var(--igrs-font-mono);
            font-size: 12px;
            cursor: pointer;
            color: var(--igrs-text);
            transition: all 0.2s;
        }
        #igrs-app-container .chip.active { background: var(--igrs-text); color: white; border-color: var(--igrs-text); }

        /* PERBAIKAN GRID KARTU - Memaksa Multikolom Minimal 240px */
        #igrs-app-container .game-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 16px; 
            width: 100%;
        }

        #igrs-app-container .game-card {
            background: var(--igrs-surface);
            border: 1px solid var(--igrs-border);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            height: 100%;
        }

        #igrs-app-container .game-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-color: var(--igrs-border-strong); }

        #igrs-app-container .game-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
        #igrs-app-container .game-title { font-family: var(--igrs-font-display); font-size: 16px; font-weight: 700; line-height: 1.3; color: var(--igrs-text); }

        #igrs-app-container .rating-pill {
            font-family: var(--igrs-font-mono);
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
        }

        #igrs-app-container .r-3 { background: var(--igrs-green-bg); color: var(--igrs-green); }
        #igrs-app-container .r-13 { background: var(--igrs-blue-bg); color: var(--igrs-blue); }
        #igrs-app-container .r-15 { background: var(--igrs-amber-bg); color: var(--igrs-amber); }
        #igrs-app-container .r-18 { background: var(--igrs-red-bg); color: var(--igrs-red); }
        #igrs-app-container .r-unrated { background: #eee; color: #777; }

        #igrs-app-container .publisher { font-size: 13px; color: var(--igrs-text-muted); margin-bottom: auto; }
        #igrs-app-container .platform-tag { font-size: 10px; background: #F0EEEA; padding: 4px 8px; border-radius: 4px; color: var(--igrs-text-muted); font-family: var(--igrs-font-mono); }

        /* PERBAIKAN STYLING MODAL DETAIL */
        #igrs-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 24, 20, 0.7);
            backdrop-filter: blur(8px);
            z-index: 9999999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #igrs-modal-overlay.active { display: flex; }

        #igrs-modal-overlay .modal-content {
            background: var(--igrs-surface);
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        #igrs-modal-overlay .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            background: var(--igrs-bg);
            border: 1px solid var(--igrs-border);
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--igrs-text);
            font-size: 18px;
            transition: all 0.2s;
            z-index: 100;
        }
        #igrs-modal-overlay .close-modal:hover { background: var(--igrs-border-strong); }

        #igrs-modal-overlay .modal-header-bar {
            padding: 2.5rem 2.5rem 1.5rem;
            border-bottom: 1px solid var(--igrs-border);
            background: var(--igrs-surface);
        }

        #igrs-modal-overlay .modal-scroll-area {
            padding: 2rem 2.5rem 2.5rem;
        }

        #igrs-modal-overlay .detail-section-label {
            font-family: var(--igrs-font-mono);
            font-size: 11px;
            color: var(--igrs-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        #igrs-modal-overlay .synopsis-box {
            font-size: 14px;
            line-height: 1.7;
            color: var(--igrs-text);
            background: #fafafa;
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid var(--igrs-border);
        }

        #igrs-modal-overlay .rating-desc-premium {
            background: var(--igrs-bg);
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 14px;
            border-left: 4px solid var(--igrs-amber); /* Warna default indikator rating */
            white-space: pre-line;
            color: var(--igrs-text);
            line-height: 1.6;
            border-top: 1px solid var(--igrs-border);
            border-right: 1px solid var(--igrs-border);
            border-bottom: 1px solid var(--igrs-border);
        }
        #igrs-modal-overlay .rating-desc-premium.bor-3 { border-left-color: var(--igrs-green); }
        #igrs-modal-overlay .rating-desc-premium.bor-13 { border-left-color: var(--igrs-blue); }
        #igrs-modal-overlay .rating-desc-premium.bor-15 { border-left-color: var(--igrs-amber); }
        #igrs-modal-overlay .rating-desc-premium.bor-18 { border-left-color: var(--igrs-red); }

        #igrs-app-container .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 2rem; }
        #igrs-app-container .page-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--igrs-border); background: var(--igrs-surface); font-size: 13px; font-family: var(--igrs-font-mono); cursor: pointer; color: var(--igrs-text); transition: all 0.2s; }
        #igrs-app-container .page-btn:hover:not(:disabled) { background: var(--igrs-bg); }
        #igrs-app-container .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #igrs-app-container .page-info { font-size: 13px; font-family: var(--igrs-font-mono); color: var(--igrs-text-muted); }

        @media (max-width: 600px) {
            #igrs-app-container .game-grid { grid-template-columns: 1fr; }
            #igrs-app-container .metrics-grid { grid-template-columns: 1fr 1fr; }
            #igrs-modal-overlay .modal-content { border-radius: 16px; }
            #igrs-modal-overlay .modal-header-bar { padding: 2rem 1.5rem 1.5rem; }
            #igrs-modal-overlay .modal-scroll-area { padding: 1.5rem; }
            #igrs-app-container .dropdown-group { flex-direction: column; width: 100%; }
            #igrs-app-container .sort-box select, #igrs-app-container .platform-box select { width: 100%; padding: 10px 14px; }
        }
    </style>
</head>
<body class="modal-open">

<!-- Modal Overlay sekarang berada di luar container, tapi di-cover oleh variabel CSS -->
<div id="igrs-modal-overlay" onclick="closeDetail(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" aria-label="Tutup" onclick="closeDetail()">✕</button>
        <div id="igrs-modal-body" style="overflow-y: auto; flex: 1; min-height: 0; width: 100%;">
            <!-- Konten Modal via JS -->
        </div>
    </div>
</div>

<div id="igrs-app-container">
    <header>
        <div class="header-title">
            <h1>IGRS Index</h1>
            <p>Database Indonesia Game Rating System</p>
        </div>
        <div class="sync-badge" id="syncStatus">
            <span class="dot"></span>
            <span id="syncText">Inisialisasi...</span>
        </div>
    </header>

    <div class="metrics-grid">
        <div class="metric-card"><label>Total Gim</label><div class="value" id="mTotal">0</div></div>
        <div class="metric-card"><label>Tersaring</label><div class="value" id="mFiltered">0</div></div>
        <div class="metric-card"><label>Hal. Dimuat</label><div class="value" id="mFetched">0</div></div>
        <div class="metric-card"><label>Estimasi API</label><div class="value" id="mApiTotal">--</div></div>
    </div>

    <div class="sync-progress" id="progressArea">
        <div class="progress-info"><span id="progressLabel">Menghubungkan ke API IGRS...</span><span id="progressPct">0%</span></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="controls-bar">
        <div class="search-row">
            <div class="search-box">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <input type="text" id="searchInput" placeholder="Cari nama gim atau penerbit..." oninput="onSearch()">
            </div>
            <div class="dropdown-group">
                <div class="platform-box">
                    <select id="platformSelect" onchange="onPlatformFilter()">
                        <option value="all">Semua Platform</option>
                        <option value="pc">PC</option>
                        <option value="android">Android</option>
                        <option value="ios">iOS</option>
                        <option value="playstation">PlayStation</option>
                        <option value="xbox">Xbox</option>
                        <option value="nintendo">Nintendo</option>
                    </select>
                </div>
                <div class="sort-box">
                    <select id="sortSelect" onchange="onSort()">
                        <option value="id_desc">Urutan: Terbaru</option>
                        <option value="name_asc">Nama: A-Z</option>
                        <option value="name_desc">Nama: Z-A</option>
                        <option value="year_desc">Rilis: Terbaru</option>
                        <option value="year_asc">Rilis: Terlama</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="filter-chips">
            <span class="chip active" data-rating="all">Semua Rating</span>
            <span class="chip" data-rating="3+">3+</span>
            <span class="chip" data-rating="13+">13+</span>
            <span class="chip" data-rating="15+">15+</span>
            <span class="chip" data-rating="18+">18+</span>
        </div>
    </div>

    <!-- Menghilangkan nesting class grid -->
    <div id="gameContainer"></div>
    <div class="pagination" id="pagination"></div>
</div>

<script>
(function() {
    const API_BASE = 'https://api.igrs.id/public/games';
    const DISPLAY_SIZE = 24; 

    let allGames = [];
    let filteredGames = [];
    let ratingFilter = 'all';
    let platformFilter = 'all';
    let searchQuery = '';
    let sortOrder = 'id_desc';
    let displayPage = 0;
    let isSyncing = false;

    const elements = {
        total: document.getElementById('mTotal'),
        filtered: document.getElementById('mFiltered'),
        fetched: document.getElementById('mFetched'),
        apiTotal: document.getElementById('mApiTotal'),
        progressFill: document.getElementById('progressFill'),
        progressPct: document.getElementById('progressPct'),
        progressLabel: document.getElementById('progressLabel'),
        syncStatus: document.getElementById('syncStatus'),
        syncText: document.getElementById('syncText'),
        container: document.getElementById('gameContainer'),
        pagination: document.getElementById('pagination'),
        progressArea: document.getElementById('progressArea'),
        modal: document.getElementById('igrs-modal-overlay'),
        modalBody: document.getElementById('igrs-modal-body'),
        sortSelect: document.getElementById('sortSelect')
    };

    const sleep = ms => new Promise(res => setTimeout(res, ms));

    async function startSync() {
        if (isSyncing) return;
        isSyncing = true;
        elements.syncStatus.classList.add('active');
        elements.syncText.innerText = "Sinkronisasi...";
        let page = 0;
        let totalPages = 100;

        try {
            while (page < 1000) {
                const response = await fetch(`${API_BASE}?page=${page}&size=20&sort=id,desc`);
                if (!response.ok) break;
                const data = await response.json();
                const items = data._embedded?.publicGameResultList || data.content || [];
                if (data.page) { totalPages = data.page.totalPages; elements.apiTotal.innerText = totalPages; }
                if (items.length === 0) break;
                items.forEach(g => { if (!allGames.find(x => x.id === g.id)) allGames.push(g); });
                elements.total.innerText = allGames.length.toLocaleString('id-ID');
                elements.fetched.innerText = page + 1;
                const prog = Math.min(100, Math.round(((page + 1) / totalPages) * 100));
                elements.progressFill.style.width = prog + '%';
                elements.progressPct.innerText = prog + '%';
                elements.progressLabel.innerText = `Memuat: ${allGames.length} gim`;
                if (page === 0 || page % 5 === 0) applyFilters();
                page++;
                await sleep(50);
            }
            isSyncing = false;
            elements.syncText.innerText = "Data Sinkron";
            elements.syncStatus.classList.remove('active');
            setTimeout(() => elements.progressArea.style.opacity = '0', 2000);
            setTimeout(() => elements.progressArea.style.display = 'none', 2500);
            applyFilters();
        } catch (e) { console.error(e); }
    }

    window.onSearch = () => { searchQuery = document.getElementById('searchInput').value.toLowerCase(); displayPage = 0; applyFilters(); };
    window.onSort = () => { sortOrder = elements.sortSelect.value; applyFilters(); };
    window.onPlatformFilter = () => { platformFilter = document.getElementById('platformSelect').value; displayPage = 0; applyFilters(); };

    document.querySelectorAll('#igrs-app-container .chip').forEach(chip => {
        chip.addEventListener('click', function() {
            document.querySelectorAll('#igrs-app-container .chip').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            ratingFilter = this.dataset.rating;
            displayPage = 0;
            applyFilters();
        });
    });

    function applyFilters() {
        let results = [...allGames];
        if (ratingFilter !== 'all') results = results.filter(g => g.ratings?.some(r => r.name.trim() === ratingFilter));
        
        if (platformFilter !== 'all') {
            results = results.filter(g => {
                let platsRaw = g.platformsName || g.platforms || g.gamePlatforms || [];
                if (!Array.isArray(platsRaw)) return false;
                return platsRaw.some(p => {
                    let pName = typeof p === 'object' ? p.name : p;
                    return pName.toLowerCase().includes(platformFilter);
                });
            });
        }

        if (searchQuery) results = results.filter(g => (g.name?.toLowerCase().includes(searchQuery)) || (g.publisherName?.toLowerCase().includes(searchQuery)));
        
        results.sort((a, b) => {
            if (sortOrder === 'name_asc') return (a.name || "").localeCompare(b.name || "");
            if (sortOrder === 'name_desc') return (b.name || "").localeCompare(a.name || "");
            if (sortOrder === 'year_desc') return (b.releaseYear || 0) - (a.releaseYear || 0);
            if (sortOrder === 'year_asc') return (a.releaseYear || 0) - (b.releaseYear || 0);
            return b.id - a.id;
        });

        filteredGames = results;
        elements.filtered.innerText = filteredGames.length.toLocaleString('id-ID');
        render();
    }

    function render() {
        const start = displayPage * DISPLAY_SIZE;
        const slice = filteredGames.slice(start, start + DISPLAY_SIZE);
        if (slice.length === 0) { 
            elements.container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--igrs-text-faint); font-size: 14px;">Tidak ada data ditemukan.</div>'; 
            elements.pagination.innerHTML = '';
            return; 
        }
        
        // Membungkus kartu dengan grid sejati
        elements.container.innerHTML = `<div class="game-grid">` + slice.map(g => {
            const r = g.ratings?.[0]?.name || 'UR';
            const rc = r.includes('3') ? 'r-3' : r.includes('13') ? 'r-13' : r.includes('15') ? 'r-15' : r.includes('18') ? 'r-18' : 'r-unrated';
            const plats = (g.platformsName || g.platforms || []).slice(0,3).map(x => `<span class="platform-tag">${typeof x === 'object' ? x.name : x}</span>`).join(' ');
            return `
                <div class="game-card" onclick="openDetail(${g.id})">
                    <div class="game-header">
                        <span class="game-title">${g.name}</span>
                        <span class="rating-pill ${rc}">${r}</span>
                    </div>
                    <div class="publisher">${g.publisherName || 'Penerbit Anonim'}</div>
                    <div style="display:flex;gap:5px;flex-wrap:wrap;">${plats}</div>
                </div>
            `;
        }).join('') + `</div>`;
        renderPager();
    }

    window.openDetail = async id => {
        elements.modal.classList.add('active');
        document.body.style.overflow = 'hidden';
        elements.modalBody.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;"><div style="width:40px;height:40px;border:4px solid var(--igrs-border);border-top-color:var(--igrs-text);border-radius:50%;animation:igrs-spin 0.8s linear infinite;"></div><p style="margin-top:15px;font-size:12px;color:var(--igrs-text-faint);font-family:var(--igrs-font-mono);">Sinkronisasi data resmi...</p></div>`;
        
        try {
            const res = await fetch(`${API_BASE}/${id}`);
            const g = await res.json();
            const r = g.ratings?.[0] || {};
            const desc = r.contentId || g.ratingDescription || r.description || "Deskripsi klasifikasi tidak tersedia untuk gim ini.";
            const plats = (g.platformsName || g.platforms || []).map(x => `<span class="platform-tag" style="font-size:11px; padding: 4px 10px;">${typeof x === 'object' ? x.name : x}</span>`).join(' ');
            
            const rc = (r.name || "").includes('3') ? 'r-3' : (r.name || "").includes('13') ? 'r-13' : (r.name || "").includes('15') ? 'r-15' : 'r-18';
            const borderClass = (r.name || "").includes('3') ? 'bor-3' : (r.name || "").includes('13') ? 'bor-13' : (r.name || "").includes('15') ? 'bor-15' : 'bor-18';
            
            elements.modalBody.innerHTML = `
                <div class="modal-header-bar">
                    <h2 style="font-family:var(--igrs-font-display); font-size:clamp(22px, 4vw, 28px); line-height:1.2; margin:0 0 16px 0; color:var(--igrs-text); padding-right:40px;">${g.name}</h2>
                    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                        <span class="rating-pill ${rc}" style="font-size:18px; padding:8px 22px; border-radius:10px; font-weight:800; letter-spacing:0.5px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">${r.name || 'UNRATED'}</span>
                        <span style="font-family:var(--igrs-font-mono); font-size:14px; color:var(--igrs-text); font-weight:600; background:var(--igrs-bg); border:1px solid var(--igrs-border); padding:8px 16px; border-radius:10px;">Terbit: ${g.releaseYear || 'N/A'}</span>
                    </div>
                    <div style="font-size:14px; color:var(--igrs-text-muted); margin-top:20px; font-weight:500;">Penerbit: <span style="color:var(--igrs-text)">${g.publisherName || 'Tidak diketahui'}</span></div>
                </div>
                
                <div class="modal-scroll-area">
                    <div style="margin-bottom:2.5rem;">
                        <span class="detail-section-label">Sinopsis & Cerita</span>
                        <div class="synopsis-box">${g.description || 'Sinopsis belum tersedia untuk gim ini.'}</div>
                    </div>
                    
                    <div style="margin-bottom:2.5rem;">
                        <span class="detail-section-label">Platform Tersedia</span>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">${plats || '<span style="color:var(--igrs-text-faint); font-style:italic;">Data platform tidak tersedia</span>'}</div>
                    </div>

                    <div>
                        <span class="detail-section-label">Kriteria Klasifikasi IGRS</span>
                        <div class="rating-desc-premium ${borderClass}">
                            <strong style="display:block; margin-bottom:12px; color:var(--igrs-text); font-size:15px;">Kategori ${r.name}:</strong>
                            ${desc}
                        </div>
                    </div>

                    <div style="margin-top:3.5rem; padding-top:20px; border-top:1px solid var(--igrs-border); font-size:11px; color:var(--igrs-text-faint); font-family:var(--igrs-font-mono); display:flex; justify-content:space-between; letter-spacing:0.05em;">
                        <span>ID: #${g.id}</span>
                        <span>IGRS.ID OFFICIAL</span>
                    </div>
                </div>
            `;
        } catch(e) { elements.modalBody.innerHTML = '<div style="text-align:center;padding:50px;color:var(--igrs-red);">Gagal memuat detail gim.</div>'; }
    };

    window.closeDetail = () => { elements.modal.classList.remove('active'); document.body.style.overflow = ''; };
    function renderPager() { const tp = Math.ceil(filteredGames.length / DISPLAY_SIZE); if (tp <= 1) { elements.pagination.innerHTML = ''; return; } elements.pagination.innerHTML = `<button class="page-btn" onclick="goP(${displayPage-1})" ${displayPage===0?'disabled':''}>‹</button><span class="page-info">${displayPage+1} / ${tp}</span><button class="page-btn" onclick="goP(${displayPage+1})" ${displayPage>=tp-1?'disabled':''}>›</button>`; }
    window.goP = p => { displayPage = p; render(); document.getElementById('igrs-app-container').scrollIntoView({behavior:'smooth'}); };

    startSync();
})();
</script>
</body>
</html>
